services:

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.2

    container_name: redpanda

    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092

    ports:
      - "9092:9092"
      - "9644:9644"

    networks:
      - pog-network

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9010:9000"
      - "9011:9001"

    volumes:
      - minio_data:/data

    healthcheck:
      test: [
        "CMD",
        "curl",
        "-f",
        "http://localhost:9000/minio/health/live"
      ]
      interval: 30s
      timeout: 20s
      retries: 3

    networks:
      - pog-network



# ============================================================
  # ClickHouse — persistent data + auto-init schema
  # ============================================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse

    ports:
      - "8123:8123"   # HTTP  (curl / tabix)
      - "9000:9000"   # Native TCP (clickhouse-client)

    environment:
      CLICKHOUSE_DB:       ${CLICKHOUSE_DB}
      CLICKHOUSE_USER:     ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}

    volumes:
      - clickhouse_data:/var/lib/clickhouse          # ← persistent data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro  # ← runs once

    ulimits:
      nofile:
        soft: 262144
        hard: 262144

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - pog-network


  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    networks:
      - pog-network    


  # tabix:
  #   image: spoonest/clickhouse-tabix-web-client:stable
