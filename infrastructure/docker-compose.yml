  simulator:
    build:
      context: ../simulator

    container_name: simulator

    command: python main.py

    env_file:
      - ../.env

    depends_on:
      - redpanda

    restart: always

    networks:
      - pog-network



  transaction-consumer:
    build:
      context: ../simulator

    container_name: transaction-consumer

    command: python consumer.py

    env_file:
      - ../.env

    depends_on:
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_started

    restart: always

    networks:
      - pog-network



