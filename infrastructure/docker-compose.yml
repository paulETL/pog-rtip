  flink-python:
    build:
      context: ../
      dockerfile: flink-jobs/Dockerfile

    container_name: flink-python

    env_file:
      - ../.env

    volumes:
      - ../flink-jobs:/opt/flink/jobs

    depends_on:
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
      minio:
        condition: service_healthy

    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        execution.checkpointing.interval: 10 s
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: ${MINIO_ROOT_USER}
        s3.secret-key: ${MINIO_ROOT_PASSWORD}

    command: >
      bash -c "
      sleep 30 &&
      echo 'Starting Flink Kafka to MinIO ingestion...' &&
      flink run -py /opt/flink/jobs/kafka_to_minio.py
      "

    networks:
      - pog-network


  dagster:
    build:
      context: ..
      dockerfile: ./orchestration/Dockerfile
    container_name: dagster
    env_file:
    - ../.env
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: pog-rtip-raw
      DATABRICKS_HOST: ${DATABRICKS_HOST}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN}
      DATABRICKS_HTTP_PATH: ${DATABRICKS_HTTP_PATH}
      DAGSTER_HOME: /opt/dagster/dagster_home   
    volumes:
      - ../orchestration:/opt/dagster/app
      - ../dbt:/opt/dagster/app/dbt
      - ../dbt/profiles.yml:/opt/dagster/app/profiles.yml
      - dagster_home:/opt/dagster/dagster_home  
    ports:
      - "3001:3000"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - pog-network

  dbt:
    build:
      context: ../dbt
    container_name: dbt
    env_file:
      - .env
    volumes:
      - ../dbt:/dbt
    networks:
      - pog-network
    depends_on:
      - minio

